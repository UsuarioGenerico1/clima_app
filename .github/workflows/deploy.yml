name: Deploy to GitHub Pages
on:
  push:
    branches: ['main'] 

# Permisos estrictamente necesarios para que GitHub Actions pueda publicar en Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite que solo haya un despliegue a la vez
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Trabajo 1: Construir el proyecto y ejecutar pruebas
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Instalar y configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.16' 

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas unitarias
        run: npm run test

      - name: Construir el proyecto (Vite build)
        run: npm run build

      - name: Subir los archivos construidos como artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # Trabajo 2: Desplegar a GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build 
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4